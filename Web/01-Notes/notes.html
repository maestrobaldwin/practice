Tags:

4. <script src="file_name.js"></script> - placed immediately before closing body tag
5. <p> - paragraph tag
6. <h1> - header tag
7. <a href="/file_name.html"> - anchor tag for linking to other pages
    always put the link in double quotes, and the link should be relative to the current file (e.g. if the file is in the same folder, just use the file name, if it's in a different folder, use the folder name followed by the file name)
8. <img src="/file_name.jpg"> - image tag
9. <iframe src="/file_name.pdf"> - iframe tag for embedding pdf files
10. <button><a href="mailto:email_address">Contact Me</a></button> - button tag with anchor tag for email link
11. <nav> - navigation tag for grouping links together
12. <br> - line break tag
13. <body> - body tag for containing the main content of the webpage
14. <title> - title tag for setting the title of the webpage
15. <html> - root tag for the entire HTML document
16. <link rel="stylesheet" href="style.css"> - link tag for linking to an external CSS file
17. <p id="id_name"> - paragraph tag with an id attribute for styling or scripting purposes
18. <h2> - subheader tag
19. <div> - division tag for grouping content together
20. <class> - class attribute for styling or scripting purposes
21. <id> - id attribute for styling or scripting purposes
        in javascript - class is indicated by . and id is indicated by #
22. <input> - input tag for creating form elements
23. <placeholder> - attribute for input tag to provide a hint to the user about what to enter in the input field
24. <type> - attribute for input tag to specify the type of input (e.g. text, email, password, etc.)
        Types are: range, checkbox, radio, submit, reset, button, color, date, datetime-local, email, file, hidden, month, number, password, search, tel, time, url, week
        Format is: <input type="type_name" placeholder="placeholder_text">
        types don't have to be in double quotes, but strongly recommended to avoid errors and ensure proper functionality
25. <div> - division tag for grouping content together, often used for styling purposes
    elements in a div are considered to be nested within the div, and can be styled or manipulated together using CSS or JavaScript
26. <li> - list item tag for creating items in an ordered or unordered list
        Lists can be: links, images, lists, and text
27. <ul> - unordered list tag for creating a list of items with bullet points
28. <ol> - ordered list tag for creating a list of items with numbers
